{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">{% endblock %}

{% block login %}
<div class="page-wrapper">
    <main class="login-container">
        <div class="logo-section">
            <img src="{% static 'img/Logo.jpg' %}" alt="SafePaws Logo">
            <h1>SafePaws</h1>
            <p>Sistema de Gestión Interna</p>
        </div>

        <form id="loginForm" class="login-card" method="POST" action="{% url 'accounts:login' %}" novalidate>
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Usuario" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper"> <input type="password" id="password" name="password"
                        placeholder="••••••••" required>
                    <button type="button" id="togglePassword">👁️</button>
                </div>
            </div>

            <div class="options">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Recordarme</label>
                </div>
                <a href="{% url 'recuperar_contrasena' %}" id="forgotPassword" class="forgot-password">¿Olvidaste tu
                    contraseña?</a>
            </div>
            {% if error %}
                 <p style="color:red;">{{ error }}</p>
            {% endif %}

            <button type="submit" id="loginBtn">Iniciar Sesión</button>

            <div id="error" class="error-message"
                style="color: #e74c3c; font-size: 14px; margin-top: 10px; text-align: center;"></div>

            <div class="demo-credentials">
                <h4>🔑 Usuarios de demostración:</h4>
                <p><strong>Administrador:</strong> admin / 123456</p>
            </div>
        </form>
    </main>
</div>
{% endblock %}
