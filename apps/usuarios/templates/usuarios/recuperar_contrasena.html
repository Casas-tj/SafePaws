{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">{% endblock %}

{% block reset_password %}
<div class="page-wrapper">
    <main class="login-container">
        <div class="logo-section">
            <img src="{% static 'img/Logo.jpg' %}" alt="SafePaws Logo">
            <h1>SafePaws</h1>
            <p>Recuperación de Contraseña</p>
        </div>

        <form id="recoveryForm" class="login-card" novalidate>
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="recovery-username" placeholder="Ingrese su usuario" autocomplete="username"
                    required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="text" id="recovery-email" placeholder="correo@dominio.com" autocomplete="email" required>
            </div>

            <button type="submit" id="recoveryBtn">Solicitar Recuperación</button>

            <div id="message" class="message-display"></div>

            <a href="{% url 'login' %}" class="btn-secondary">Volver al Inicio de Sesión</a>
        </form>
    </main>
</div>
{% endblock %}
