{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">{% endblock %}

{% block reset_password %}
<div class="page-wrapper">
    <main class="login-container">
        <div class="logo-section">
            <img src="{% static 'img/Logo.jpg' %}" alt="SafePaws Logo">
            <h1>SafePaws</h1>
            <p>Recuperación de Contraseña</p>
        </div>

        <form id="recoveryForm" class="login-card" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="text" name="email" id="recovery-email" placeholder="correo@dominio.com"
                    autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="telefono">Motivo de la Solicitud</label>
                <input type="text" name="motivo" id="recovery-reason" placeholder="Ejemplo: He olvidado mi contraseña"
                    required>
            </div>

            <button type="submit" id="recoveryBtn">Crear ticket de recuperación</button>

            <div id="message" class="message-display">
                {% if ticket_creado %}
                Ticket creado: {{ ticket_id }}
                {% endif %}
            </div>

            <a href="{% url 'accounts:login' %}" class="btn-secondary">Volver al Inicio de Sesión</a>
        </form>
    </main>
</div>
{% endblock %}
