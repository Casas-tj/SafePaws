{% extends "layouts/base.html" %}

{% block title %}SafePaws - Roles del Sistema{% endblock %}

{% block content %}
<div class="list-header">
    <h1 class="section-title">Listado de Roles</h1>

    {% include 'layouts/partials/btn-back.html' %}
</div>

<div class="main-container-flex">
    <div class="search-section-container">
        <div class="search-bar-container">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input-list"
                    placeholder="Buscar por nombre, apellidos, email, tipo, estado o año" oninput="filterTable()">
            </div>

            <div class="filter-buttons">
                <div style="position: relative; display: inline-block;">
                    <button id="btnSortDate" class="btn-filter">📅 Fecha</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="table-wrapper">
    <table class="data-table-list">
        <thead>
            <tr>
                <th onclick="sortTable('tipo')">Rol <span class="sort-icon">↕</span></th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                {% for role in roles %}
                <td>{{ role.name }}</td>
                <td>
                    <div class="actions-cell">
                        <a href="{% url 'roles_form_edit' role.id %}" class="action-btn action-edit"
                            title="Editar">✏️</a>

                        <form method="POST" action="{% url 'roles_delete' role.id %}">
                            {% csrf_token %}
                            <button type="submit" class="action-btn action-delete" title="Eliminar"
                                onclick="return confirm('¿Eliminar rol?');">❌</button>
                        </form>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
