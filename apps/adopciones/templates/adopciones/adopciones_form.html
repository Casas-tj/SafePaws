{% extends "layouts/base.html" %}

{% block title %}SafePaws - Registrar Nueva Adopción{% endblock %}

<!-- Contenido Principal -->
{% block content %}
<div class="form-view animal-form" style="margin: 0 auto;">
    <div class="form-header">
        <h1 class="form-title">Nueva Solicitud de Adopción</h1>
    </div>

    <form method="POST" id="formNuevaAdopcion" class="animal-form" action="">
        {% csrf_token %}
        <fieldset>
            <legend>Información de la Adopción</legend>
            <div class="form-row">
                <div class="form-group">
                    <label for="animal">Nombre del Animal *</label>
                    <input type="text" id="animal" name="animal_name" class="form-control-list" placeholder="Ej: Max"
                        required>
                </div>

                <div class="form-group">
                    <label for="estado">Estado de la Solicitud *</label>
                    <select id="estado" name="status" class="form-control-list" required>
                        <option value="" disabled selected>Selecciona el estado</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Aprobada">Aprobada</option>
                        <option value="Completada">Completada</option>
                        <option value="Rechazada">Rechazada</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha de Registro *</label>
                    <input type="date" id="fecha" name="registration_date" class="form-control-list" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="adoptante">Nombre del Adoptante *</label>
                    <input type="text" id="adoptante" name="adopter_name" class="form-control-list"
                        placeholder="Nombre completo" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono *</label>
                    <input type="tel" id="telefono" name="phone" class="form-control-list" placeholder="555-0101"
                        required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" class="form-control-list"
                        placeholder="ejemplo@correo.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group form-group-full">
                    <label for="direccion">Dirección del Domicilio</label>
                    <input type="text" id="direccion" name="address" class="form-control-list"
                        placeholder="Calle, número, ciudad...">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Observaciones</legend>
            <div class="form-row">
                <div class="form-group form-group-full">
                    <textarea id="observaciones" name="observations" class="form-control-list form-textarea" rows="4"
                        placeholder="Detalles adicionales..."></textarea>
                </div>
            </div>
        </fieldset>

        <!-- Botones -->
        <div class="form-buttons">
            <button type="submit" class="btn-success">
                ✅ Registrar Adopción
            </button>

            <button type="reset" class="btn-danger" style="background-color: #f59e0b;">
                🔄 Limpiar Formulario
            </button>

            {% include 'layouts/partials/btn-back.html' %}
        </div>
    </form>
</div>
{% endblock %}
