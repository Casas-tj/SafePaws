{% extends "layouts/base.html" %}

{% block title %}SafePaws - Registrar Nueva Adopción{% endblock %}

<!-- Contenido Principal -->
{% block content %}
<div class="form-view animal-form" style="margin: 0 auto;">
    <div class="form-header">
        <h1 class="form-title">Nueva Solicitud de Adopción</h1>
    </div>

    <form id="formNuevaAdopcion">
        <div class="form-row">
            <div class="form-group">
                <label for="animal">Nombre del Animal *</label>
                <input type="text" id="animal" class="form-control-list" placeholder="Ej: Max" required>
            </div>
            <div class="form-group">
                <label for="estado">Estado Inicial *</label>
                <select id="estado" class="form-control-list" required>
                    <option value="" disabled selected>Selecciona el estado</option>
                    <option value="En Proceso">En Proceso</option>
                    <option value="Aprobada">Aprobada</option>
                    <option value="Completada">Completada</option>
                    <option value="Rechazada">Rechazada</option>
                </select>
            </div>
            <div class="form-group">
                <label for="fecha">Fecha de Registro *</label>
                <input type="date" id="fecha" class="form-control-list" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="adoptante">Nombre del Adoptante *</label>
                <input type="text" id="adoptante" class="form-control-list" placeholder="Nombre completo" required>
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" class="form-control-list" placeholder="555-0101" required>
            </div>
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" class="form-control-list" placeholder="ejemplo@correo.com" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group form-group-full">
                <label for="direccion">Dirección del Domicilio</label>
                <input type="text" id="direccion" class="form-control-list" placeholder="Calle, número, ciudad...">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group form-group-full">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" class="form-control-list form-textarea" rows="4"
                    placeholder="Detalles adicionales..."></textarea>
            </div>
        </div>

        <!-- Botones -->
        <div class="form-buttons">
            <button type="submit" class="btn-success">
                ✅ Registrar Adopción
            </button>

            <button type="reset" class="btn-danger" style="background-color: #f59e0b;">
                🔄 Limpiar Formulario
            </button>

            {% include 'layouts/partials/btn-back.html' %}
        </div>
    </form>
</div>
{% endblock %}
